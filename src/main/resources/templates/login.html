<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - AppVerse</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="gradient-bg"></div>
    <div class="container" style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
        <div class="glass-card animate-in" style="width: 100%; max-width: 440px;">
            <div style="text-align: center; margin-bottom: 2.5rem;">
                <div class="logo" style="margin-bottom: 0.5rem; font-size: 1.5rem;">APPVERSE</div>
                <p style="color: var(--text-muted); font-size: 0.95rem;">Enter your credentials to access your secure
                    account</p>
            </div>

            <h2 style="font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center;">Welcome Back</h2>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="" required>
                </div>

                <div class="form-group">
                    <label for="fingerprint">Fingerprint</label>
                    <input type="password" id="fingerprint" placeholder="" required>
                </div>

                <button type="submit" class="btn btn-primary"
                    style="width: 100%; margin-top: 0.5rem; padding: 0.875rem;">
                    Sign In to Portal
                </button>
            </form>

            <div style="margin-top: 2rem; text-align: center; font-size: 0.95rem; color: var(--text-muted);">
                New to the platform? <a th:href="@{/register}"
                    style="color: var(--primary); text-decoration: none; font-weight: 600;">Create an account</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const fingerprint = document.getElementById('fingerprint').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, fingerprint })
                });

                if (response.ok) {
                    sessionStorage.setItem('loggedInEmail', email);
                    window.location.href = '/dashboard';
                } else {
                    const err = await response.text();
                    alert(err);
                }
            } catch (error) {
                alert('An error occurred during login. Please check your connection.');
            }
        });
    </script>
</body>

</html>
