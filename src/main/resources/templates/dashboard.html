<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AppVerse</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: #f8fafc;
            padding: 0;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .nav {
            background: white;
            padding: 1rem 2rem;
            border-bottom: 1px solid #e2e8f0;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dashboard-container {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 0;
            width: 100vw;
        }

        .app-tile {
            position: relative;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .app-tile:hover {
            filter: brightness(1.1);
            transform: scale(1.02);
            z-index: 10;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.2);
        }

        .app-name {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            text-transform: uppercase;
        }

        .app-desc {
            font-size: 0.875rem;
            opacity: 0.8;
            margin-top: 0.5rem;
        }

        /* Themes */
        .theme-shopee {
            background: #EE4D2D !important;
        }

        .theme-tokopedia {
            background: #42B549 !important;
        }

        .theme-gojek {
            background: #00AA13 !important;
        }

        .theme-fore {
            background: #005C32 !important;
        }

        .theme-janjijiwa {
            background: #4B3621 !important;
        }

        .theme-instagram {
            background: linear-gradient(45deg, #405DE6, #5851DB, #833AB4, #C13584, #E1306C, #FD1D1D) !important;
        }

        .app-tile {
            background-color: #2c3e50;
            min-height: 200px;
        }
    </style>
</head>

<body>
    <nav class="nav">
        <div class="logo">APPVERSE</div>
        <div style="display: flex; gap: 1.5rem; align-items: center;">
            <div style="text-align: right;">
                <div id="userName" style="font-weight: 700; font-size: 0.95rem; color: var(--text);">User</div>
                <div style="font-size: 0.75rem; color: var(--text-muted);">Verified Session</div>
            </div>
            <a href="#" onclick="logoutUser(event)" class="btn btn-outline" style="padding: 0.5rem 1rem; font-size: 0.875rem;">Sign Out</a>
        </div>
    </nav>

    <div class="dashboard-container" id="appsGrid">
        <!-- Apps will be loaded here -->
    </div>

    <script>
        // Fetch interceptor to inject X-User-Email header
        const originalFetch = window.fetch;
        window.fetch = function(url, options = {}) {
            const email = sessionStorage.getItem('loggedInEmail');
            if (email) {
                options.headers = options.headers || {};
                if (options.headers instanceof Headers) {
                    options.headers.set('X-User-Email', email);
                } else {
                    options.headers['X-User-Email'] = email;
                }
            }
            return originalFetch(url, options);
        };

        function logoutUser(e) {
            e.preventDefault();
            sessionStorage.removeItem('loggedInEmail');
            window.location.href = '/login';
        }

        async function loadDashboard() {
            const grid = document.getElementById('appsGrid');
            try {
                const userRes = await fetch('/api/auth/me');
                if (!userRes.ok) { window.location.href = '/login'; return; }
                const user = await userRes.json();
                document.getElementById('userName').innerText = user.name;

                // Sync email to sessionStorage if missing
                if (!sessionStorage.getItem('loggedInEmail') && user.email) {
                    sessionStorage.setItem('loggedInEmail', user.email);
                }

                const appsRes = await fetch('/api/apps');
                if (!appsRes.ok) throw new Error('Failed to load apps');
                const apps = await appsRes.json();

                grid.innerHTML = '';
                apps.forEach(app => {
                    // Create class: Janji Jiwa -> theme-janjijiwa
                    const cleanName = app.nama.toLowerCase().replace(/\s+/g, '');
                    const themeClass = `theme-${cleanName}`;

                    const tile = document.createElement('a');
                    tile.href = `/app/${app.id}`;
                    tile.className = `app-tile ${themeClass}`;
                    tile.innerHTML = `
                        <div class="app-name">${app.nama}</div>
                        <div class="app-desc">Launch Application &rarr;</div>
                    `;
                    grid.appendChild(tile);
                });
            } catch (error) {
                console.error('Dashboard Load Error:', error);
                grid.innerHTML = `<div style="grid-column: span 3; text-align: center; color: red; padding: 2rem;">Error: ${error.message}</div>`;
            }
        }
        loadDashboard();
    </script>
</body>

</html>
