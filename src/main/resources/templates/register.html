<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Sistem Identitas</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<div id="conflictModal"
    style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 1rem;">
    <div class="glass-card" style="max-width: 400px; width: 100%; text-align: center;">
        <h3 style="color: #ef4444; margin-bottom: 1rem;">Fingerprint Conflict</h3>
        <p id="conflictMsg" style="margin-bottom: 2rem; color: #64748b;"></p>
        <div style="display: grid; gap: 1rem;">
            <button onclick="resolveConflict('USE_OLD')" class="btn btn-primary" style="padding: 1rem;">Use Existing
                Account</button>
            <button onclick="resolveConflict('NEW')" class="btn btn-outline" style="padding: 1rem;">Deactivate Old &
                Start New</button>
        </div>
    </div>
</div>

<div class="gradient-bg"></div>
<div class="container" style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div class="glass-card animate-in" style="width: 100%; max-width: 480px;">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <div class="logo" style="margin-bottom: 0.5rem; font-size: 1.5rem;">APPVERSE</div>
            <p style="color: var(--text-muted); font-size: 0.95rem;">Join the unified enterprise ecosystem</p>
        </div>

        <h2 style="font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center;">Register Account</h2>

        <form id="registerForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="" required>
            </div>

            <div class="form-group">
                <label for="fingerprint">Fingerprint</label>
                    <input type="password" id="fingerprint" placeholder="" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem; padding: 0.875rem;">
                Complete Registration
            </button>
        </form>

        <div style="margin-top: 2rem; text-align: center; font-size: 0.95rem; color: var(--text-muted);">
            Already have an account? <a th:href="@{/login}"
                style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign in here</a>
        </div>
    </div>
</div>

<script>
    let currentPayload = {};

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        currentPayload = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            fingerprint: document.getElementById('fingerprint').value
        };

        try {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(currentPayload)
            });

            if (response.ok) {
                alert('Registration successful! Please login.');
                window.location.href = '/login';
            } else if (response.status === 409) {
                const data = await response.json();
                currentPayload.oldEmail = data.oldEmail;
                document.getElementById('conflictMsg').innerText = data.message + "\n\nIf you choose to start new, your old account will be deactivated and all data will be transferred to your new email.";
                document.getElementById('conflictModal').style.display = 'flex';
            } else {
                const err = await response.text();
                alert(err);
            }
        } catch (error) {
            alert('An error occurred during registration.');
        }
    });

    async function resolveConflict(action) {
        try {
            const response = await fetch('/api/auth/register-confirm', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ...currentPayload, action })
            });

            if (response.ok) {
                alert(action === 'USE_OLD' ? 'Welcome back! Please login with your old email.' : 'New account created and data transferred successfully! Please login.');
                window.location.href = '/login';
            } else {
                alert('Resolution failed.');
            }
        } catch (error) {
            alert('Error resolving conflict.');
        }
    }
</script>
</body>

</html>
